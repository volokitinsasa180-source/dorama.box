<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoramaBox — Смотреть Дорамы Онлайн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DoramaBox</div>
        <input type="text" id="search" placeholder="Поиск дорамы по названию...">
    </header>

    <main>
        <div id="catalog" class="grid-container"></div>
    </main>

    <div id="player-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Название дорамы</h2>
            <div class="iframe-container">
                <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
